<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="320" fill="url(#bg)" rx="10"/>

  <!-- ===== Window 3 (back): onboarding — just title bar visible ===== -->
  <g transform="translate(28, 16)" filter="url(#shadow)">
    <rect width="664" height="26" rx="7" fill="#1c2129" stroke="#30363d" stroke-width="1"/>
    <circle cx="14" cy="13" r="4" fill="#f85149" opacity="0.5"/>
    <circle cx="27" cy="13" r="4" fill="#d29922" opacity="0.5"/>
    <circle cx="40" cy="13" r="4" fill="#3fb950" opacity="0.5"/>
    <text x="332" y="17" text-anchor="middle" fill="#484f58" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">agent/onboarding</text>
    <circle cx="648" cy="13" r="3" fill="#3fb950" opacity="0.4"/>
  </g>

  <!-- ===== Window 2 (middle): billing — title bar + a sliver ===== -->
  <g transform="translate(22, 30)" filter="url(#shadow)">
    <rect width="676" height="34" rx="7" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <circle cx="14" cy="13" r="4" fill="#f85149" opacity="0.6"/>
    <circle cx="27" cy="13" r="4" fill="#d29922" opacity="0.6"/>
    <circle cx="40" cy="13" r="4" fill="#3fb950" opacity="0.6"/>
    <text x="338" y="17" text-anchor="middle" fill="#6e7681" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">agent/billing</text>
    <circle cx="660" cy="13" r="3" fill="#3fb950" opacity="0.5"/>
  </g>

  <!-- ===== Window 1 (front): auth — full window ===== -->
  <g transform="translate(16, 48)" filter="url(#shadow)">
    <!-- Window frame -->
    <rect width="688" height="240" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect width="688" height="28" rx="8" fill="#161b22"/>
    <rect y="20" width="688" height="8" fill="#161b22"/>
    <circle cx="16" cy="14" r="4.5" fill="#f85149" opacity="0.8"/>
    <circle cx="30" cy="14" r="4.5" fill="#d29922" opacity="0.8"/>
    <circle cx="44" cy="14" r="4.5" fill="#3fb950" opacity="0.8"/>
    <text x="344" y="18" text-anchor="middle" fill="#c9d1d9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="bold">agent/auth</text>
    <circle cx="672" cy="14" r="3.5" fill="#3fb950">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- ===== Agent pane (top ~65%) ===== -->
    <text x="18" y="50" fill="#58a6ff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" font-weight="bold">claude</text>
    <text font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">
      <tspan x="18" y="70" fill="#7ee787">$ </tspan><tspan fill="#c9d1d9">Fixing JWT refresh token bug in middleware/auth.ts</tspan>
      <tspan x="18" y="86" fill="#7ee787">$ </tspan><tspan fill="#c9d1d9">Reading middleware/auth.ts...</tspan>
      <tspan x="18" y="102" fill="#58a6ff">i </tspan><tspan fill="#8b949e">Found expired token check at line 47 — refresh window is 0, should be 300s</tspan>
      <tspan x="18" y="118" fill="#7ee787">$ </tspan><tspan fill="#c9d1d9">Editing middleware/auth.ts — fixing token refresh window</tspan>
      <tspan x="18" y="134" fill="#7ee787">$ </tspan><tspan fill="#c9d1d9">Writing tests for refresh token edge cases...</tspan>
      <tspan x="18" y="150" fill="#58a6ff">i </tspan><tspan fill="#8b949e">Created test: should refresh token when within 300s of expiry</tspan>
    </text>
    <!-- Cursor -->
    <rect x="415" y="141" width="7" height="11" fill="#58a6ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- ===== Divider ===== -->
    <line x1="12" y1="168" x2="676" y2="168" stroke="#30363d" stroke-width="1"/>

    <!-- ===== Shell pane (bottom ~35%) ===== -->
    <text x="18" y="186" fill="#d2a8ff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10.5" font-weight="bold">shell</text>
    <text font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">
      <tspan x="18" y="204" fill="#3fb950">~/myapp </tspan><tspan fill="#8b949e">npm test -- --watch auth</tspan>
      <tspan x="18" y="220" fill="#7ee787">PASS </tspan><tspan fill="#8b949e">tests/auth.test.ts (3 tests)</tspan>
    </text>
  </g>

  <!-- ===== tmux status bar ===== -->
  <rect y="294" width="720" height="26" fill="#161b22"/>
  <rect y="294" width="720" height="1" fill="#30363d" opacity="0.4"/>

  <!-- Window tabs -->
  <rect x="10" y="299" width="38" height="16" rx="3" fill="#264f78" opacity="0.6"/>
  <text font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">
    <tspan x="15" y="311" fill="#c9d1d9" font-weight="bold">auth</tspan>
    <tspan x="62" y="311" fill="#8b949e">billing</tspan>
    <tspan x="114" y="311" fill="#8b949e">onboarding</tspan>
  </text>

  <!-- Right side status -->
  <text font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9.5">
    <tspan x="560" y="311" fill="#484f58">3 agents</tspan>
    <tspan x="620" y="311" fill="#3fb950">3 active</tspan>
    <tspan x="690" y="311" fill="#484f58">ag</tspan>
  </text>
</svg>